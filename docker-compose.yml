services:
  rails:
    build:
      context: .
      args:
        RAILS_ENV: development
        BUNDLE_DEPLOYMENT: ""
        BUNDLE_WITHOUT: ""
    command: ["./bin/rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    environment:
      RAILS_ENV: development
      BUNDLE_DEPLOYMENT: ""
      BUNDLE_WITHOUT: ""
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle

volumes:
  bundle:
